name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic python-multipart pypdf python-dotenv anthropic ollama pytest
      - name: Backend syntax + tests
        run: |
          python -m py_compile backend/main.py
          pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install + lint + build
        run: |
          cd frontend
          npm ci || npm install
          npm run lint
          npm run build
